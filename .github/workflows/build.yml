name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '桌面记事本 ${{ github.ref_name }}'
          releaseBody: |
            ## Desktop Notepad ${{ github.ref_name }}

            ### ✨ 新增功能
            - 🔒 口令锁屏：防止他人窥视，SHA-256 加密存储
            - ☁️ WebDAV 同步：跨设备数据同步，支持备份/恢复
            - 📊 年度热力图：GitHub 风格，一眼看到全年产出
            - 💻 Mac 风格代码块：红黄绿圆点 + 语言标签
            - 🎨 毛玻璃蘑菇卡片风格：backdrop-filter 模糊 + 饱和增强
            - 🌙 暗色模式：Apple 风格深色主题

            ### 🛠 改进
            - 安装路径改为英文 Desktop Notepad
            - 主色调升级为靛紫色 (#6366f1)
            - 按钮改为圆角胶囊形状
            - 卡片全面升级毛玻璃效果
            - 移除登录系统，自动创建默认用户

            ### 📦 下载
            | 平台 | 文件 |
            |------|------|
            | Windows | `.msi` 或 `.exe` 安装包 |
            | macOS | `.dmg`（支持 Intel 和 Apple Silicon） |
            | Linux | `.deb` 安装包 |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
